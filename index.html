<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fryseroversigt</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a1628;--bg2:#0e1e38;--bg3:#081020;--frost:#1a2f50;
    --border:rgba(100,160,220,0.15);--border2:rgba(100,160,220,0.3);
    --text:#c8dff5;--text2:#6a90b8;--text3:#3d5f80;
    --accent:#4db8ff;--accent2:#1a6fa0;
    --in-bg:#0d3352;--in-border:#2a7fba;--in-text:#7dd4ff;
    --success:#4fffb0;--danger:#ff6b6b;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(77,184,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(77,184,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 8rem;}

  header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;gap:1rem;}
  .logo{display:flex;align-items:center;gap:14px;min-width:0;}
  .logo-icon{width:52px;height:52px;flex-shrink:0;background:var(--frost);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;}
  h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1.1;}
  h1 span{display:block;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.15em;font-family:'DM Mono',monospace;margin-top:4px;}
  .header-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .counter-badge{background:var(--frost);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:14px;color:var(--accent);text-align:center;line-height:1.4;white-space:nowrap;}
  .counter-badge strong{display:block;font-size:24px;color:#fff;font-family:'Syne',sans-serif;}
  .edit-toggle{background:var(--frost);border:1px solid var(--border2);border-radius:10px;padding:14px 20px;font-size:15px;color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;}
  .edit-toggle.active{background:rgba(255,107,107,0.12);border-color:rgba(255,107,107,0.4);color:var(--danger);}
  .time-display{font-size:13px;color:var(--text3);letter-spacing:.1em;margin-top:4px;}

  /* Section */
  .section-wrap{margin-top:1.25rem;}
  .section-head{display:flex;align-items:center;gap:8px;margin-bottom:.6rem;}
  .section-label{font-size:10px;letter-spacing:.18em;color:var(--text3);text-transform:uppercase;padding-left:2px;flex:1;}
  .section-label-input{font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;padding:2px 4px;outline:none;width:160px;}
  .section-label-input:focus{border-bottom-color:var(--accent);}
  .btn-del-section{background:none;border:1px solid rgba(255,107,107,0.3);border-radius:6px;color:var(--danger);font-size:11px;padding:3px 8px;cursor:pointer;font-family:'DM Mono',monospace;opacity:.7;transition:opacity .1s;}
  .btn-del-section:hover{opacity:1;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}

  /* Item card */
  .item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;-webkit-tap-highlight-color:transparent;user-select:none;min-height:110px;transition:border-color .15s,background .15s;}
  .item.in{background:var(--in-bg);border-color:var(--in-border);}
  .item .emoji{font-size:28px;line-height:1;pointer-events:none;}
  .item .name{font-size:11px;font-weight:500;color:var(--text2);line-height:1.3;text-align:center;pointer-events:none;}
  .item.in .name{color:var(--in-text);}
  .item .qty-row{display:flex;align-items:center;gap:0;margin-top:4px;background:rgba(0,0,0,.25);border-radius:8px;overflow:hidden;}
  .item .qty-btn{width:30px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;transition:background .1s,color .1s;line-height:1;-webkit-tap-highlight-color:transparent;}
  .item .qty-btn:active{background:rgba(77,184,255,.15);color:var(--accent);transform:scale(.88);}
  .item.in .qty-btn{color:var(--in-text);}
  .item .qty-num{min-width:28px;text-align:center;font-size:15px;font-weight:500;color:var(--success);font-family:'Syne',sans-serif;pointer-events:none;}
  .item:not(.in) .qty-num{color:var(--text3);}

  /* Delete overlay on item (edit mode) */
  .item .item-del{position:absolute;inset:0;border-radius:14px;background:rgba(255,60,60,.13);border:1.5px solid rgba(255,107,107,.4);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--danger);}
  .edit-mode .item .item-del{display:flex;}
  .edit-mode .item .qty-row{opacity:.25;pointer-events:none;}

  /* Add row */
  .add-section-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);}
  .add-item-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:.75rem;}
  .add-item-row select{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 12px;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);outline:none;cursor:pointer;flex:1;min-width:140px;}
  .add-item-row select:focus{border-color:var(--accent);}
  input.txt{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;font-family:'DM Mono',monospace;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;}
  input.txt:focus{border-color:var(--accent);}
  input.txt::placeholder{color:var(--text3);}
  .btn{background:var(--accent2);border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-family:'DM Mono',monospace;font-size:15px;font-weight:500;padding:14px 20px;cursor:pointer;transition:background .12s,transform .08s;white-space:nowrap;}
  .btn:active{transform:scale(.95);}
  .hint{font-size:12px;color:var(--text3);margin-top:.5rem;padding-left:2px;}

  /* Add item to category pill (edit mode hidden otherwise) */
  .add-to-section{display:none;background:rgba(77,184,255,.07);border:1px dashed var(--border2);border-radius:10px;padding:8px;cursor:pointer;font-size:11px;color:var(--text3);text-align:center;transition:background .12s;}
  .add-to-section:hover{background:rgba(77,184,255,.14);color:var(--accent);}

  @media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}h1{font-size:18px;}}
  @media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}.item{min-height:125px;}.item .emoji{font-size:34px;}.item .name{font-size:13px;}}
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🧊</div>
      <div>
        <h1>FRYSEREN<span>OVERSIGT</span></h1>
        <div class="time-display" id="clock"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="edit-toggle" id="editBtn" onclick="toggleEdit()">✏️ Rediger</button>
      <div class="counter-badge"><strong id="count">0</strong>varer i alt</div>
    </div>
  </header>

  <div id="sections"></div>

  <!-- Add new category -->
  <div class="add-section-row">
    <input class="txt" type="text" id="newCatName" placeholder="Ny overskrift (f.eks. 🧃 Drikkevarer)..." maxlength="30" />
    <button class="btn" onclick="addCategory()">+ Kategori</button>
  </div>

  <!-- Add new item -->
  <div class="add-item-row">
    <input class="txt" type="text" id="newName" placeholder="Ny vare..." maxlength="25" />
    <input class="txt" type="text" id="newEmoji" placeholder="🐟" maxlength="4" style="width:64px;flex:none;text-align:center;font-size:22px;padding:14px 6px;" />
    <select id="newCat"></select>
    <button class="btn" onclick="addItem()">+ Vare</button>
  </div>
  <div class="hint">Tip: Tryk og hold på emoji-feltet for emoji-tastatur på mobil</div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const DEFAULT_CATS = [
  { id:'cat-meat',  label:'🥩 Kød & fisk',    items:[
    {e:'🥩',n:'Oksekød'},{e:'🍗',n:'Kylling'},{e:'🐟',n:'Fisk'},
    {e:'🥓',n:'Bacon'},{e:'🦐',n:'Rejer'},{e:'🌭',n:'Pølser'},
    {e:'🐷',n:'Svinekød'},{e:'🦆',n:'And'},
  ]},
  { id:'cat-veg',   label:'🥦 Grønt & frugt', items:[
    {e:'🌿',n:'Ærter'},{e:'🥕',n:'Gulerødder'},{e:'🌽',n:'Majs'},
    {e:'🍓',n:'Jordbær'},{e:'🫐',n:'Blåbær'},{e:'🥦',n:'Broccoli'},
    {e:'🧅',n:'Løg'},{e:'🫛',n:'Bønner'},
  ]},
  { id:'cat-ready', label:'🍕 Færdigretter',  items:[
    {e:'🍕',n:'Pizza'},{e:'🥘',n:'Lasagne'},{e:'🍲',n:'Suppe'},
    {e:'🫕',n:'Gryderet'},{e:'🥙',n:'Wrap/Burrito'},
  ]},
  { id:'cat-other', label:'🍦 Andet',          items:[
    {e:'🧊',n:'Isterninger'},{e:'🍞',n:'Brød'},{e:'🧈',n:'Smør'},
    {e:'🍦',n:'Is'},{e:'🥚',n:'Æg'},
  ]},
];

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// cats: [{id, label, items:[{e,n}]}]
// state: {itemKey: count}
let cats  = load('fryser_cats', JSON.parse(JSON.stringify(DEFAULT_CATS)));
let state = load('fryser_qty',  {});
let editMode = false;

function itemKey(catId, name){ return catId+'::'+name.toLowerCase().replace(/\s+/g,'-'); }

// ── Counter ───────────────────────────────────────────────────────────────────
function updateCounter(){
  const total = Object.values(state).reduce((a,b)=>a+(b||0),0);
  document.getElementById('count').textContent = total;
}

// ── Edit mode ─────────────────────────────────────────────────────────────────
function toggleEdit(){
  editMode = !editMode;
  document.getElementById('app').classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.textContent = editMode ? '✓ Færdig' : '✏️ Rediger';
  btn.classList.toggle('active', editMode);
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const sec = document.getElementById('sections');
  sec.innerHTML = '';

  for(const cat of cats){
    const wrap = document.createElement('div');
    wrap.className = 'section-wrap';
    wrap.dataset.catId = cat.id;

    // Section header
    const head = document.createElement('div');
    head.className = 'section-head';

    const labelInput = document.createElement('input');
    labelInput.className = 'section-label-input';
    labelInput.value = cat.label;
    labelInput.spellcheck = false;
    labelInput.addEventListener('change', ()=>{
      cat.label = labelInput.value;
      save('fryser_cats', cats);
      populateCatSelect();
    });
    // Show as plain text when not in edit mode via pointer-events
    labelInput.addEventListener('pointerdown', e=>{ if(!editMode) e.preventDefault(); });

    const labelSpan = document.createElement('span');
    labelSpan.className = 'section-label';
    labelSpan.textContent = cat.label;

    // In edit mode show input, otherwise span
    if(editMode){
      head.appendChild(labelInput);
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del-section';
      delBtn.textContent = 'Slet kategori';
      delBtn.onclick = ()=>{
        if(cat.items.length > 0 && !confirm(`Slet "${cat.label}" og alle dens varer?`)) return;
        cats = cats.filter(c=>c.id !== cat.id);
        // clean state
        for(const item of cat.items){ delete state[itemKey(cat.id, item.n)]; }
        save('fryser_cats', cats);
        save('fryser_qty', state);
        updateCounter();
        render();
        populateCatSelect();
      };
      head.appendChild(delBtn);
    } else {
      head.appendChild(labelSpan);
    }

    wrap.appendChild(head);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'grid';

    for(const item of cat.items){
      grid.appendChild(buildItem(cat.id, item.e, item.n));
    }

    wrap.appendChild(grid);
    sec.appendChild(wrap);
  }

  updateCounter();
  populateCatSelect();
}

function buildItem(catId, e, n){
  const k = itemKey(catId, n);
  const qty = state[k] || 0;
  const div = document.createElement('div');
  div.className = 'item' + (qty > 0 ? ' in' : '');
  div.dataset.key = k;

  // Delete overlay
  const delOverlay = document.createElement('div');
  delOverlay.className = 'item-del';
  delOverlay.textContent = '✕';
  delOverlay.title = 'Slet vare';
  delOverlay.onclick = ev => {
    ev.stopPropagation();
    const cat = cats.find(c=>c.id===catId);
    if(!cat) return;
    cat.items = cat.items.filter(i=>i.n !== n);
    delete state[k];
    save('fryser_cats', cats);
    save('fryser_qty', state);
    updateCounter();
    render();
  };

  const emojiEl = document.createElement('span');
  emojiEl.className = 'emoji';
  emojiEl.textContent = e;

  const nameEl = document.createElement('span');
  nameEl.className = 'name';
  nameEl.textContent = n;

  const qtyRow = document.createElement('div');
  qtyRow.className = 'qty-row';

  const minus = document.createElement('button');
  minus.className = 'qty-btn minus';
  minus.textContent = '−';
  minus.setAttribute('aria-label','Fjern en');
  minus.onclick = ev => { ev.stopPropagation(); setQty(catId, k, (state[k]||0)-1, div); };

  const qtyNum = document.createElement('span');
  qtyNum.className = 'qty-num';
  qtyNum.textContent = qty;

  const plus = document.createElement('button');
  plus.className = 'qty-btn plus';
  plus.textContent = '+';
  plus.setAttribute('aria-label','Tilføj en');
  plus.onclick = ev => { ev.stopPropagation(); setQty(catId, k, (state[k]||0)+1, div); };

  qtyRow.append(minus, qtyNum, plus);
  div.append(delOverlay, emojiEl, nameEl, qtyRow);
  return div;
}

function setQty(catId, k, val, card){
  state[k] = Math.max(0, val);
  save('fryser_qty', state);
  updateCounter();
  if(!card) return;
  const qty = state[k]||0;
  card.classList.toggle('in', qty > 0);
  card.querySelector('.qty-num').textContent = qty;
}

// ── Category select ───────────────────────────────────────────────────────────
function populateCatSelect(){
  const sel = document.getElementById('newCat');
  sel.innerHTML = '';
  for(const cat of cats){
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.label;
    sel.appendChild(opt);
  }
}

// ── Add category ──────────────────────────────────────────────────────────────
function addCategory(){
  const inp = document.getElementById('newCatName');
  const label = inp.value.trim();
  if(!label){ inp.focus(); return; }
  const id = 'cat-'+Date.now();
  cats.push({ id, label, items:[] });
  save('fryser_cats', cats);
  inp.value = '';
  render();
}

// ── Add item ─────────────────────────────────────────────────────────────────
function addItem(){
  const nameEl  = document.getElementById('newName');
  const emojiEl = document.getElementById('newEmoji');
  const catSel  = document.getElementById('newCat');
  const n = nameEl.value.trim();
  const e = emojiEl.value.trim() || '📦';
  const catId = catSel.value;
  if(!n){ nameEl.focus(); return; }
  if(!catId){ alert('Vælg en kategori'); return; }
  const cat = cats.find(c=>c.id===catId);
  if(!cat) return;
  cat.items.push({e,n});
  save('fryser_cats', cats);
  nameEl.value=''; emojiEl.value='';
  render();
  setTimeout(()=>{
    const k = itemKey(catId, n);
    const el = document.querySelector(`[data-key="${k}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

// Enter triggers
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('newName').addEventListener('keydown',e=>{ if(e.key==='Enter') addItem(); });
  document.getElementById('newCatName').addEventListener('keydown',e=>{ if(e.key==='Enter') addCategory(); });
});

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock,10000);

render();
</script>
</body>
</html>
