<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Fryseroversigt v6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap&v=6" rel="stylesheet">
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* === TOKENS === */
:root {
  --bg:      #0a1628;
  --bg2:     #0e1e38;
  --frost:   #1a2f50;
  --border:  rgba(100,160,220,0.15);
  --border2: rgba(100,160,220,0.30);
  --text:    #c8dff5;
  --text2:   #6a90b8;
  --text3:   #3d5f80;
  --accent:  #4db8ff;
  --accent2: #1a6fa0;
  --in-bg:   #0d3352;
  --in-bdr:  #2a7fba;
  --in-txt:  #7dd4ff;
  --success: #4fffb0;
  --danger:  #ff6b6b;
}

/* === BASE === */
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(77,184,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,184,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* === LAYOUT === */
.app {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 120px;
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  gap: 16px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo-icon {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
  background: var(--frost);
  border: 1px solid var(--border2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.logo-text h1 {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1;
}
.logo-text .sub {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.18em;
  margin-top: 5px;
}
.logo-text .clock {
  display: block;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-top: 3px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.edit-btn {
  background: var(--frost);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 22px;
  font-size: 16px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.edit-btn.active {
  background: rgba(255,107,107,0.12);
  border-color: rgba(255,107,107,0.4);
  color: var(--danger);
}
.counter {
  background: var(--frost);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 22px;
  text-align: center;
  white-space: nowrap;
}
.counter strong {
  display: block;
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  color: #fff;
  line-height: 1;
}
.counter span {
  font-size: 13px;
  color: var(--accent);
}

/* === SECTIONS === */
.section {
  margin-top: 28px;
}
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.section-title {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--text3);
  text-transform: uppercase;
  flex: 1;
}
.section-title-input {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  padding: 4px 6px;
  outline: none;
  flex: 1;
  min-width: 0;
}
.section-title-input:focus { border-bottom-color: var(--accent); }
.del-section-btn {
  background: none;
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 8px;
  color: var(--danger);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  flex-shrink: 0;
}

/* === GRID === */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}

/* === CARD === */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, border-color 0.12s;
  min-height: 130px;
}
.card.in {
  background: var(--in-bg);
  border-color: var(--in-bdr);
}
.card .emoji {
  font-size: 32px;
  line-height: 1;
  pointer-events: none;
}
.card .name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  text-align: center;
  line-height: 1.3;
  pointer-events: none;
}
.card.in .name { color: var(--in-txt); }

/* qty row */
.qty-row {
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 4px;
}
.qty-btn {
  width: 36px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  line-height: 1;
  color: var(--text2);
  background: transparent;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.qty-btn:active {
  background: rgba(77,184,255,0.2);
  color: var(--accent);
}
.card.in .qty-btn { color: var(--in-txt); }
.qty-num {
  min-width: 32px;
  text-align: center;
  font-size: 16px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: var(--success);
  pointer-events: none;
}
.card:not(.in) .qty-num { color: var(--text3); }

/* delete overlay */
.card-del {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: rgba(255,50,50,0.13);
  border: 1.5px solid rgba(255,107,107,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: var(--danger);
  cursor: pointer;
}
.edit-mode .card-del { display: flex; }
.edit-mode .qty-row  { opacity: 0.2; pointer-events: none; }

/* === BOTTOM AREA === */
.bottom {
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.input-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: stretch;
}
.input-row input,
.input-row select {
  height: 52px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 0 16px;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.input-row input:focus,
.input-row select:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--text3); }
.input-row .inp-name  { flex: 2; min-width: 180px; }
.input-row .inp-emoji { flex: 0 0 60px; text-align: center; font-size: 22px; padding: 0 8px; }
.input-row .inp-cat   { flex: 1; min-width: 160px; }
.input-row .inp-cat-name { flex: 2; min-width: 200px; }
.action-btn {
  height: 52px;
  padding: 0 24px;
  background: var(--accent2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.08s;
  flex-shrink: 0;
}
.action-btn:active { transform: scale(0.95); }
.row-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
}
.hint {
  font-size: 12px;
  color: var(--text3);
}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🧊</div>
      <div class="logo-text">
        <h1>FRYSEREN</h1>
        <span class="sub">OVERSIGT</span>
        <span class="clock" id="clock"></span>
      </div>
    </div>
    <div class="header-right">
      <button class="edit-btn" id="editBtn" onclick="toggleEdit()">✏️ Rediger</button>
      <div class="counter">
        <strong id="count">0</strong>
        <span>varer i alt</span>
      </div>
    </div>
  </div>

  <div id="sections"></div>

  <div class="bottom">
    <div class="row-label">Tilføj ny vare</div>
    <div class="input-row">
      <input class="inp-name"  type="text" id="newName"  placeholder="Navn (f.eks. Laks)" maxlength="25" />
      <input class="inp-emoji" type="text" id="newEmoji" placeholder="🐟" maxlength="4" />
      <select class="inp-cat" id="newCat"></select>
      <button class="action-btn" onclick="addItem()">+ Vare</button>
    </div>

    <div class="row-label" style="margin-top:8px;">Tilføj ny kategori</div>
    <div class="input-row">
      <input class="inp-cat-name" type="text" id="newCatName" placeholder="Navn (f.eks. 🧃 Drikkevarer)" maxlength="30" />
      <button class="action-btn" onclick="addCategory()">+ Kategori</button>
    </div>
    <div class="hint">Tip: Tryk og hold på emoji-feltet for emoji-tastatur</div>
  </div>

</div>
<script>
// ── Defaults ──────────────────────────────────────────────────────────────────
const DEFAULTS = [
  { id:'cat-meat',  label:'🥩 Kød & fisk', items:[
    {e:'🥩',n:'Oksekød'},{e:'🍗',n:'Kylling'},{e:'🐟',n:'Fisk'},
    {e:'🥓',n:'Bacon'},{e:'🦐',n:'Rejer'},{e:'🌭',n:'Pølser'},
    {e:'🐷',n:'Svinekød'},{e:'🦆',n:'And'},
  ]},
  { id:'cat-veg', label:'🥦 Grønt & frugt', items:[
    {e:'🌿',n:'Ærter'},{e:'🥕',n:'Gulerødder'},{e:'🌽',n:'Majs'},
    {e:'🍓',n:'Jordbær'},{e:'🫐',n:'Blåbær'},{e:'🥦',n:'Broccoli'},
    {e:'🧅',n:'Løg'},{e:'🫛',n:'Bønner'},
  ]},
  { id:'cat-ready', label:'🍕 Færdigretter', items:[
    {e:'🍕',n:'Pizza'},{e:'🥘',n:'Lasagne'},{e:'🍲',n:'Suppe'},
    {e:'🫕',n:'Gryderet'},{e:'🥙',n:'Wrap/Burrito'},
  ]},
  { id:'cat-other', label:'🍦 Andet', items:[
    {e:'🧊',n:'Isterninger'},{e:'🍞',n:'Brød'},{e:'🧈',n:'Smør'},
    {e:'🍦',n:'Is'},{e:'🥚',n:'Æg'},
  ]},
];

// ── Storage ───────────────────────────────────────────────────────────────────
function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

let cats  = load('fryser_cats', JSON.parse(JSON.stringify(DEFAULTS)));
let qty   = load('fryser_qty', {});
let editMode = false;

function ikey(catId, name) { return catId + '::' + name.toLowerCase().replace(/\s+/g, '-'); }

// ── Counter ───────────────────────────────────────────────────────────────────
function refreshCounter() {
  document.getElementById('count').textContent =
    Object.values(qty).reduce((a, b) => a + (b || 0), 0);
}

// ── Edit toggle ───────────────────────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.getElementById('app').classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editBtn');
  btn.textContent = editMode ? '✓ Færdig' : '✏️ Rediger';
  btn.classList.toggle('active', editMode);
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  for (const cat of cats) {
    const section = document.createElement('div');
    section.className = 'section';

    // Head
    const head = document.createElement('div');
    head.className = 'section-head';

    if (editMode) {
      const inp = document.createElement('input');
      inp.className = 'section-title-input';
      inp.value = cat.label;
      inp.spellcheck = false;
      inp.addEventListener('change', () => { cat.label = inp.value; save('fryser_cats', cats); refreshCatSelect(); });
      head.appendChild(inp);

      const delBtn = document.createElement('button');
      delBtn.className = 'del-section-btn';
      delBtn.textContent = 'Slet kategori';
      delBtn.onclick = () => {
        if (cat.items.length > 0 && !confirm('Slet "' + cat.label + '" og alle dens varer?')) return;
        cat.items.forEach(i => delete qty[ikey(cat.id, i.n)]);
        cats = cats.filter(c => c.id !== cat.id);
        save('fryser_cats', cats);
        save('fryser_qty', qty);
        refreshCounter();
        render();
        refreshCatSelect();
      };
      head.appendChild(delBtn);
    } else {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = cat.label;
      head.appendChild(title);
    }

    section.appendChild(head);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'grid';
    cat.items.forEach(item => grid.appendChild(makeCard(cat.id, item.e, item.n)));
    section.appendChild(grid);

    container.appendChild(section);
  }

  refreshCounter();
  refreshCatSelect();
}

function makeCard(catId, e, n) {
  const k   = ikey(catId, n);
  const num = qty[k] || 0;

  const card = document.createElement('div');
  card.className = 'card' + (num > 0 ? ' in' : '');
  card.dataset.key = k;

  // Delete overlay
  const del = document.createElement('div');
  del.className = 'card-del';
  del.textContent = '✕';
  del.onclick = ev => {
    ev.stopPropagation();
    const cat = cats.find(c => c.id === catId);
    if (!cat) return;
    cat.items = cat.items.filter(i => i.n !== n);
    delete qty[k];
    save('fryser_cats', cats);
    save('fryser_qty', qty);
    refreshCounter();
    render();
  };

  const emoji = document.createElement('span');
  emoji.className = 'emoji';
  emoji.textContent = e;

  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = n;

  const row = document.createElement('div');
  row.className = 'qty-row';

  const minus = document.createElement('button');
  minus.className = 'qty-btn';
  minus.textContent = '−';
  minus.onclick = ev => { ev.stopPropagation(); changeQty(k, card, -1); };

  const numEl = document.createElement('span');
  numEl.className = 'qty-num';
  numEl.textContent = num;

  const plus = document.createElement('button');
  plus.className = 'qty-btn';
  plus.textContent = '+';
  plus.onclick = ev => { ev.stopPropagation(); changeQty(k, card, +1); };

  row.append(minus, numEl, plus);
  card.append(del, emoji, name, row);
  return card;
}

function changeQty(k, card, delta) {
  qty[k] = Math.max(0, (qty[k] || 0) + delta);
  save('fryser_qty', qty);
  refreshCounter();
  card.classList.toggle('in', qty[k] > 0);
  card.querySelector('.qty-num').textContent = qty[k];
}

// ── Cat select ────────────────────────────────────────────────────────────────
function refreshCatSelect() {
  const sel = document.getElementById('newCat');
  const prev = sel.value;
  sel.innerHTML = '';
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.label;
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;
}

// ── Add item ──────────────────────────────────────────────────────────────────
function addItem() {
  const nameEl  = document.getElementById('newName');
  const emojiEl = document.getElementById('newEmoji');
  const catSel  = document.getElementById('newCat');
  const n = nameEl.value.trim();
  const e = emojiEl.value.trim() || '📦';
  const catId = catSel.value;
  if (!n) { nameEl.focus(); return; }
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  cat.items.push({ e, n });
  save('fryser_cats', cats);
  nameEl.value = '';
  emojiEl.value = '';
  render();
  setTimeout(() => {
    const el = document.querySelector('[data-key="' + ikey(catId, n) + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ── Add category ──────────────────────────────────────────────────────────────
function addCategory() {
  const inp   = document.getElementById('newCatName');
  const label = inp.value.trim();
  if (!label) { inp.focus(); return; }
  cats.push({ id: 'cat-' + Date.now(), label, items: [] });
  save('fryser_cats', cats);
  inp.value = '';
  render();
}

// ── Enter keys ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('newName').addEventListener('keydown',    e => { if (e.key === 'Enter') addItem(); });
  document.getElementById('newCatName').addEventListener('keydown', e => { if (e.key === 'Enter') addCategory(); });
});

// ── Clock ─────────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
}
tick();
setInterval(tick, 10000);

render();
</script>
</body>
</html>
